name: Aero Fighters Assault (USA)
basename: aerofighters_assault

# Computed from local bytes (PowerShell Get-FileHash SHA1); verify against your No-Intro / redump label.
sha1: "6742f67d7d2639072e186d240237be1c662cb25a"

options:
  platform: n64
  compiler: IDO
  endianness: big
  base_address: 0x80000000
  entry_point: 0x80200050
  ld_script_path: build/aerofighters_assault.ld
  symbol_addrs_path: config/symbol_addrs.txt
  undefined_funcs_auto_path: config/undefined_funcs_auto.txt
  undefined_syms_auto_path: config/undefined_syms_auto.txt
  find_file_boundaries: True
  migrate_rodata_to_functions: False
  use_legacy_include_asm: False

segments:
  - name: header
    type: header
    start: 0x00000000
    vram: 0x80000000

  - name: boot
    type: code
    start: 0x00000040
    vram: 0x80000040
    subsegments:
      - [0x00000040, asm, boot]

  - name: main
    type: code
    start: 0x001FF000
    vram: 0x80200000
    end: 0x00380000
    subsegments:
      - [0x001FF000, asm, main]
      - [0x00280000, data]
      - [0x00300000, rodata]
