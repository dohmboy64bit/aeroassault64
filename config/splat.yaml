# splat 0.40+ — required options live under `options:` (see splat Quickstart).
# Segment layout below was produced by `python3 -m splat create_config roms/afa.n64.us.z64`
# then paths were normalized to config/ and build/.
name: Aero Fighters Assault (USA)
sha1: 6742f67d7d2639072e186d240237be1c662cb25a
options:
  basename: aerofighters_assault
  # base_path is resolved as dirname(this file) / base_path → repo root (see splat util/options.py).
  base_path: ..
  target_path: roms/afa.n64.us.z64
  elf_path: build/aerofighters_assault.elf
  platform: n64
  compiler: IDO

  ld_script_path: build/aerofighters_assault.ld
  ld_dependencies: True

  find_file_boundaries: True
  header_encoding: ASCII

  o_as_suffix: True
  use_legacy_include_asm: False
  mips_abi_float_regs: o32

  symbol_addrs_path:
    - config/symbol_addrs.txt
  reloc_addrs_path:
    - config/reloc_addrs.txt
  undefined_funcs_auto_path: config/undefined_funcs_auto.txt
  undefined_syms_auto_path: config/undefined_syms_auto.txt

  extensions_path: tools/splat_ext

  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

segments:
  - name: header
    type: header
    start: 0x0

  - name: ipl3
    type: bin
    start: 0x40

  - name: entry
    type: code
    start: 0x1000
    vram: 0x80200050
    subsegments:
      - [0x1000, hasm]

  - name: main
    type: code
    start: 0x1050
    vram: 0x802000A0
    follows_vram: entry
    # BSS must start after ROM-backed .text that maps to the same linear VRAM window as `main`
    # (ROM 0x57D20 → VRAM 0x80256D70 through 0x8027F050); see Docs/Workflow.md Phase 3 note.
    bss_size: 0x853E0
    # Phase 3: tail ROM 0x57D20+ = MIPS (Ghidra). `rodata` was a single [0x52B90, rodata]; splat 0.40.0 split
    # stdout suggests finer rodata boundaries (extra nops @ VRAM 80251BE0) — applied below through 0x57A60 only.
    # Do not paste splat's following `asm` hints (0x58080+): those collide with existing `main` asm subsegments.
    # Asm file splits only for ROM < 0x4C050. ROM >= 0x57D20 stays one `post_data` asm (VRAM order vs bss).
    subsegments:
      - [0x1050, asm]
      - [0x1370, asm]
      - [0x2180, asm]
      - [0x48E0, asm]
      - [0x6840, asm]
      - [0x8210, asm]
      - [0x91E0, asm]
      - [0x9600, asm]
