# RSPRecomp template for Aero Fighters Assault (USA) — aspMain ucode.
# `text_offset` / `text_size` / `text_address` below match **`roms/afa.n64.us.z64`** SHA1 in **`config/splat.yaml`** (see trailing comment block). Re-derive with **`tools/rsprecomp_*.py`** if your cart differs.
# Schema matches upstream MM file (same keys as RSPRecomp expects):
#   https://raw.githubusercontent.com/Mr-Wiseguy/Zelda64Recomp/master/aspMain.us.rev1.toml
#
# Typical workflow: copy this file to lib/Zelda64Recomp/aspMain.afa.us.toml, set rom_file_path to your
# byteswapped USA z64 next to the engine root, run from engine root:
#   ./RSPRecomp.exe aspMain.afa.us.toml
# Output: lib/Zelda64Recomp/rsp/aspMain.cpp (see upstream BUILDING.md section 4 when present in the engine tree).
#
# extra_indirect_branch_targets: MM lists many word offsets (see upstream aspMain.us.rev1.toml URL above).
# AFA may need its own list from microcode analysis / RSPRecomp guidance — start with [] only if RSPRecomp accepts it.

# Derived with **`tools/rsprecomp_scan_offsets.py`** + **`tools/rsprecomp_left_edge.py`** on **`roms/afa.n64.us.z64`**:
# first RSPRecomp-stable offset in .data after splat crash band; INVALID stderr rises after ~0x4E570
# for a 0x1000 window. Not the MIPS hit at 0x4BE20 (**`asm/4BE20.s`** **`func_8024AE70`**).
text_offset = 0x4DAB0
text_size = 0x1000
text_address = 0x04001000
rom_file_path = "afa.n64.us.z64"
output_file_path = "rsp/aspMain.cpp"
output_function_name = "aspMain"
# RSPRecomp may not emit blocks at these IMEM offsets; phase6_rsprecomp_afa.ps1 runs rsprecomp_patch_rsp_cpp.py after regen.
extra_indirect_branch_targets = [0x888, 0xF68]
