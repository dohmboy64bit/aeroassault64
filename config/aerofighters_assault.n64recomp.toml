# N64Recomp static recompilation input ‚Äî Aero Fighters Assault (USA) smoke ELF.
#
# Field names and [input] layout match N64Recomp `src/config.cpp` at upstream commit
# 81213c1831fab2521a6a5459c67b63437d67e253 (see `tools/README.txt`). Paths below are
# relative to this file's directory (`config/`), same as `concat_if_not_empty(basedir, ...)`
# in that parser.
#
# Entry VRAM matches splat / linker (`Makefile` `-e entrypoint`) and `config/symbol_addrs.txt`
# (`entrypoint = 0x80200050`).
#
# Do not set `symbols_file_path` together with `elf_path` ‚Äî `src/main.cpp` rejects both.

[input]
entrypoint = 0x80200050
elf_path = "../build/aerofighters_assault.elf"
output_func_path = "../RecompiledFuncs"

# `asm/4BE20.s`: `func_8024AE70` is an 8-byte stub ‚Äî `j func_84001064` (KSEG1-style
# `0x8400‚Ä¶` target). N64Recomp reports "Unhandled branch ‚Ä¶ to 0x84001064" for that
# opcode (`src/main.cpp` applies `[[patches.instruction]]` via `instruction_patches`).
# Replace with `jr $ra` / `nop` so static recomp does not follow hardware bootstrap
# control flow the runtime port will replace anyway.

[patches]

stubs = [
    # `asm/4BE20.s` ‚Äî `func_8024AE78`: handwritten COP0 / `jal` / `j` into `0x8400‚Ä¶`
    # bootstrap. N64Recomp `recompilation.cpp` skips body when `func.stubbed`
    # (`stubs` list in `src/main.cpp`); `analyze_function` hits "Unhandled cop0 register in mtc0: 0" otherwise.
    "func_8024AE78",
    # `asm/3E750.s` ‚Äî `func_8023D7F0`: D-cache index-invalidate loop (`cache 0x01, ‚Ä¶`).
    # N64Recomp `recompilation.cpp` / `process_instruction`: "Unhandled instruction: cache".
    "func_8023D7F0",
    # `asm/3FFD0.s` ‚Äî `func_8023F020`: cache ops 0x15 / 0x11 / 0x01.
    "func_8023F020",
    # `asm/3DDC0.s` ‚Äî `func_8023CE80`: cache ops 0x19 / 0x01.
    "func_8023CE80",
    # `asm/49090.s` ‚Äî `func_802480E0`: cache ops 0x10 / 0x00.
    "func_802480E0",
