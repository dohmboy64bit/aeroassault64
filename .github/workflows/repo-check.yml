# ROM-free checks: splat/Makefile, rodata Ghidra tuple, entry VRAM triple, N64Recomp TOML, py_compile.
# Does not run splat split, make, or N64Recomp (no ROM / ELF / Windows PE on ubuntu-latest).
name: repo-check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: splat.yaml basename vs Makefile ELF
        run: python3 tools/verify_splat_makefile_sync.py

      - name: RODATA tuple vs splat.yaml
        run: python3 tools/verify_rodata_splits_sync.py

      - name: Entry VRAM (splat entry / symbol_addrs / N64Recomp TOML)
        run: python3 tools/verify_entrypoint_sync.py

      - name: N64Recomp game TOML
        run: python3 tools/verify_n64recomp_toml.py

      - name: py_compile tools/*.py
        run: |
          python3 -m py_compile \
            tools/dedupe_post_data_bss.py \
            tools/n64recomp_stub_until_green.py \
            tools/verify_rodata_splits_sync.py \
            tools/verify_splat_makefile_sync.py \
            tools/verify_entrypoint_sync.py \
            tools/verify_n64recomp_toml.py \
            tools/gen_splat_extern_ld.py
